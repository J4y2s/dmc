<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var map=L.map('lieux-map',{center:[48.1,7.8],zoom:8,attributionControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:18,subdomains:'abcd'}).addTo(map);
var icon=L.divIcon({html:'<div style="width:8px;height:8px;border-radius:50%;background:#8B1A1A;border:1.5px solid #D8CEBC;box-shadow:0 0 6px rgba(139,26,26,.6)"></div>',className:'',iconSize:[8,8],iconAnchor:[4,4]});
[
  [48.0348,7.5836,'BREISACH_AM_RHEIN','Le clubhouse. Der Durchgang. Le cœur du club.'],
  [48.0159,7.5559,'VOLGELSHEIM','Le Passage. Chapter français. Territoire de Brume.'],
  [48.026,7.575,'PONT_DU_RHIN','Le refuge. Entre deux mondes, entre deux pays.'],
  [48.5789,7.8161,'KEHL','Zum Rheintor. Face à Strasbourg. Territoire de Maulwurf.'],
  [47.999,7.842,'FORET_NOIRE','Les caches. Les planques. L'endroit où on disparaît.'],
  [47.7508,7.3359,'MULHOUSE','Le Fond de Cale. Axe sud vers la Suisse.'],
  [48.5734,7.7521,'STRASBOURG','Le Consulat. Institutions, contacts, discrétion.'],
].forEach(function(l){
  L.marker([l[0],l[1]],{icon:icon}).addTo(map).bindPopup(
    '<span style="font-family:'Share Tech Mono',monospace;font-size:11px;color:#D8CEBC">'+l[2]+'</span><br><span style="font-size:10px;color:#70665A">'+l[3]+'</span>',
    {maxWidth:200}
  );
});
</script>
